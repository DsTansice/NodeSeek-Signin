name: nodeseek鸡腿签到

on:
  push:
    branches:
      - main
  schedule:
    - cron: '00 16 * * *'  # 北京时间 00:00 (UTC+8)，对应UTC时间 16:00
  workflow_dispatch:

permissions:
  contents: read
  actions: write  # 添加写入Actions变量的权限

jobs:
  run-nodeseek-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v3
      
      - name: 配置Python环境
        uses: actions/setup-python@v2
        with:
          python-version: '3.11.8'

      - name: 安装依赖包
        run: |
          pip install curl_cffi requests --upgrade


      - name: 运行签到脚本
        env:
          # 基本账号
          USER: ${{ secrets.USER }}
          PASS: ${{ secrets.PASS }}
          
          # 额外账号1-5
          USER1: ${{ secrets.USER1 }}
          PASS1: ${{ secrets.PASS1 }}
          USER2: ${{ secrets.USER2 }}
          PASS2: ${{ secrets.PASS2 }}
          USER3: ${{ secrets.USER3 }}
          PASS3: ${{ secrets.PASS3 }}
          USER4: ${{ secrets.USER4 }}
          PASS4: ${{ secrets.PASS4 }}
          USER5: ${{ secrets.USER5 }}
          PASS5: ${{ secrets.PASS5 }}
          
          # Cookie配置
          NS_COOKIE: ${{ vars.NS_COOKIE || secrets.NS_COOKIE }}
          NS_RANDOM: ${{ secrets.NS_RANDOM }}
          # 验证码配置
          SOLVER_TYPE: ${{ secrets.SOLVER_TYPE }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CLIENTT_KEY: ${{ secrets.CLIENTT_KEY }}
          
          # GitHub API配置
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          
          # 指纹配置
          NS_IMPERSONATE: ${{ secrets.NS_IMPERSONATE || 'chrome110' }}

          # 通知推送配置
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_USER_ID: ${{ secrets.TG_USER_ID }}
          TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
        run: python nodeseek_sign.py

      
      - name: 保活提交（不修改 workflow）
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 创建/更新一个保活记录文件
          cat > .keepalive << EOF
          last_run: $(date -u +%Y-%m-%d_%H:%M:%S)_UTC
          next_cron: $(grep -oP "(?<=- cron: ')[^']+" .github/workflows/falix.yml)
          EOF
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git commit -m "🚀 auto: 保活 $(date -u +%Y-%m-%d)" || echo "无变更"
          
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push
